<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RETROCON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  width: 100dvw; height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

/* ── Phase 1 + 2: Terminal ──────────────────────────────── */
#terminal {
  width: min(90vw, 560px);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.t-line {
  font-size: clamp(0.6rem, 1.6vw, 0.8rem);
  letter-spacing: 0.05rem;
  color: #4fc3f7;
  opacity: 0;
  transition: opacity 0.1s;
  white-space: pre;
}
.t-line.show { opacity: 1; }
.t-line .ok  { color: #4fc3f7; }
.t-line .dim { color: #1a5a7a; }

#cursor {
  display: inline-block;
  width: 0.55em; height: 1em;
  background: #4fc3f7;
  vertical-align: middle;
  animation: cblink 0.7s step-end infinite;
  opacity: 0;
}
#cursor.show { opacity: 1; }
@keyframes cblink { 0%,100%{opacity:1} 50%{opacity:0} }

#press-key {
  margin-top: 28px;
  font-size: clamp(0.65rem, 1.8vw, 0.85rem);
  letter-spacing: 0.35rem;
  color: #4fc3f7;
  opacity: 0;
  animation: none;
  align-self: center;
}
#press-key.show {
  opacity: 1;
  animation: pblink 1s step-end infinite;
}
@keyframes pblink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Phase 3: RETROCON-Logo ─────────────────────────────── */
#logo-screen {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  align-items: center;
  justify-content: center;
}
#logo-screen.active { display: flex; }

#logo { display: flex; }
.letter {
  font-family: 'Press Start 2P', 'Courier New', monospace;
  font-size: clamp(1.8rem, 7vw, 4.5rem);
  letter-spacing: 0.05em;
  color: #4fc3f7;
  opacity: 0;
  text-shadow: 0 0 40px rgba(79,195,247,0.9), 0 0 80px rgba(79,195,247,0.4);
}
.letter.pop { animation: appear 0.14s forwards; }
@keyframes appear {
  0%   { opacity: 0; filter: brightness(8) blur(4px); }
  60%  { opacity: 1; filter: brightness(2) blur(0); }
  100% { opacity: 1; filter: brightness(1) blur(0); }
}

/* CRT-Scanlines global */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
  pointer-events: none;
  z-index: 99;
}
</style>
</head>
<body>

<!-- Phase 1 + 2 -->
<div id="terminal">
  <div id="press-key">PRESS ANY KEY TO START</div>
  <div id="cursor"></div>
</div>

<!-- Phase 3 -->
<div id="logo-screen">
  <div id="logo"></div>
</div>

<script>
const WORD  = 'RETROCON';
const DELAY = 110;

// ── Terminal-Zeilen ───────────────────────────────────────
const LINES = [
  { text: 'RETROCON OS  v0.3.0',              delay: 0 },
  { text: 'COPYRIGHT (C) 2025 RETROCON',      delay: 300 },
  { text: '',                                  delay: 550 },
  { text: 'BIOS v2.1  CHECKING MEMORY... OK', delay: 650 },
  { text: 'WEBRTC ENGINE........... LOADED',  delay: 950 },
  { text: 'P2P BROKER.............. READY',   delay: 1200 },
  { text: 'GAME MODULES............ 1 FOUND', delay: 1450 },
  { text: 'CONTROLLER DRIVER....... ACTIVE',  delay: 1700 },
  { text: '',                                  delay: 1950 },
  { text: 'SYSTEM OK.',                        delay: 2050 },
];
const PRESS_DELAY = 2500;

const terminal = document.getElementById('terminal');
const cursor   = document.getElementById('cursor');
const pressKey = document.getElementById('press-key');

// Zeilen einfügen (vor press-key)
LINES.forEach(({ text, delay }) => {
  setTimeout(() => {
    const el = document.createElement('div');
    el.className = 't-line';
    el.textContent = text;
    terminal.insertBefore(el, pressKey);
    requestAnimationFrame(() => el.classList.add('show'));
  }, delay);
});

// Cursor + Press any key
setTimeout(() => {
  cursor.classList.add('show');
}, PRESS_DELAY - 200);
setTimeout(() => {
  pressKey.classList.add('show');
  enableStart();
}, PRESS_DELAY);

// ── Phase 3: Intro-Animation ──────────────────────────────
const logoScreen = document.getElementById('logo-screen');
const logoEl     = document.getElementById('logo');
let started = false;

WORD.split('').forEach(ch => {
  const s = document.createElement('span');
  s.className = 'letter';
  s.textContent = ch;
  logoEl.appendChild(s);
});

function playBoot(ctx) {
  function tone(freq, start, dur, vol = 0.1, type = 'square') {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    const t = ctx.currentTime + start;
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(t); osc.stop(t + dur + 0.05);
  }
  [262,294,330,370,392,440,494,523].forEach((f, i) =>
    tone(f, i * (DELAY / 1000), 0.16, 0.1)
  );
  const end = WORD.length * (DELAY / 1000);
  [523,659,784].forEach((f, i) => tone(f, end + i * 0.03, 0.9, 0.07));
}

function startIntro() {
  if (started) return;
  started = true;

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  playBoot(ctx);

  logoScreen.classList.add('active');
  terminal.style.display = 'none';

  logoEl.querySelectorAll('.letter').forEach((el, i) =>
    setTimeout(() => el.classList.add('pop'), i * DELAY)
  );

  const total = WORD.length * DELAY + 1300;
  setTimeout(() => { location.href = 'console/'; }, total);
}

function enableStart() {
  document.addEventListener('keydown',    startIntro, { once: true });
  document.addEventListener('click',      startIntro, { once: true });
  document.addEventListener('touchstart', e => { e.preventDefault(); startIntro(); }, { once: true, passive: false });
}
</script>
</body>
</html>
