<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RETROCON</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  width: 100dvw;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
  cursor: pointer;
  user-select: none;
}

/* CRT scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0) 4px);
  pointer-events: none;
  z-index: 100;
}

/* CRT flicker overlay */
#flicker {
  position: fixed; inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 99;
}

#press {
  font-size: clamp(0.7rem, 2vw, 0.9rem);
  letter-spacing: 0.4rem;
  color: #555;
  animation: blink 1.1s step-end infinite;
  position: absolute;
  bottom: 18%;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#logo {
  font-size: clamp(2.5rem, 8vw, 5rem);
  letter-spacing: 0.5rem;
  opacity: 0;
  text-shadow: 0 0 40px rgba(79,195,247,0.8), 0 0 8px rgba(79,195,247,1);
  transition: opacity 0.4s;
}

#boot-log {
  margin-top: 30px;
  font-size: clamp(0.55rem, 1.5vw, 0.7rem);
  letter-spacing: 0.15rem;
  color: #4fc3f7;
  width: min(90vw, 460px);
  min-height: 5em;
  opacity: 0;
  transition: opacity 0.3s;
}
#boot-log .line { color: #555; margin: 3px 0; }
#boot-log .line .ok { color: #4caf50; }
#boot-log .line .err { color: #f44336; }
#cursor {
  display: inline-block;
  width: 8px; height: 1em;
  background: #4fc3f7;
  vertical-align: middle;
  animation: blink 0.7s step-end infinite;
}
</style>
</head>
<body>

<div id="flicker"></div>
<div id="logo">RETROCON</div>
<div id="boot-log"></div>
<div id="press">PRESS START</div>

<script>
const logo    = document.getElementById('logo');
const bootLog = document.getElementById('boot-log');
const press   = document.getElementById('press');
const flicker = document.getElementById('flicker');
let booting   = false;

// ── Audio ────────────────────────────────────────────────
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(freq, start, dur, type = 'square', vol = 0.12) {
  const t   = audioCtx.currentTime + start;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur + 0.05);
}

function playBoot() {
  ensureAudio();
  // Power-on hum
  beep(60, 0, 0.35, 'sawtooth', 0.08);
  beep(120, 0.1, 0.25, 'sawtooth', 0.05);
  // Boot chime: ascending arpeggio
  [[262,0.4],[330,0.56],[392,0.72],[523,0.88],[659,1.04],[784,1.2]]
    .forEach(([f,t]) => beep(f, t, 0.22, 'square', 0.13));
  // Final chord shimmer
  [523,659,784].forEach((f,i) => beep(f, 1.55 + i*0.04, 0.6, 'square', 0.07));
}

// ── Boot-Sequenz ─────────────────────────────────────────
const LINES = [
  { text: 'RETROCON OS v0.3.0', delay: 400 },
  { text: 'WEBRTC ENGINE........<ok>OK</ok>', delay: 700 },
  { text: 'GAME MODULES..........<ok>OK</ok>', delay: 950 },
  { text: 'CONTROLLERS...........<ok>READY</ok>', delay: 1200 },
  { text: 'ROOM ALLOCATOR........<ok>OK</ok>', delay: 1450 },
  { text: '', delay: 1700 },
  { text: 'STARTING...', delay: 1800 },
];

function addLine(html) {
  const d = document.createElement('div');
  d.className = 'line';
  d.innerHTML = html.replace(/<ok>(.*?)<\/ok>/g, '<span class="ok">$1</span>');
  bootLog.appendChild(d);
}

function crtFlicker() {
  flicker.style.opacity = '0.9';
  setTimeout(() => { flicker.style.opacity = '0.4'; }, 40);
  setTimeout(() => { flicker.style.opacity = '0.7'; }, 80);
  setTimeout(() => { flicker.style.opacity = '0'; }, 130);
}

function boot() {
  if (booting) return;
  booting = true;
  press.style.display = 'none';
  playBoot();
  crtFlicker();

  setTimeout(() => {
    logo.style.opacity = '1';
    bootLog.style.opacity = '1';
  }, 200);

  LINES.forEach(({ text, delay }) => {
    setTimeout(() => addLine(text), delay);
  });

  setTimeout(() => {
    // Letzter Flicker vor Redirect
    crtFlicker();
    setTimeout(() => { location.href = 'console.html'; }, 200);
  }, 2400);
}

document.addEventListener('click',     boot, { once: true });
document.addEventListener('touchstart', boot, { once: true });
document.addEventListener('keydown',    boot, { once: true });
</script>
</body>
</html>
