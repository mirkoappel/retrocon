<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RETROCON</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  height: 100dvh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
  pointer-events: none;
  z-index: 100;
}

/* ── Screen-System ─────────────────────────────────────── */
.screen { display: none; height: 100dvh; }
.screen.active { display: flex; }

/* ── Setup-Screen ──────────────────────────────────────── */
#setup {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 40px;
}

#setup h1 {
  font-size: clamp(1.4rem, 4vw, 2.5rem);
  letter-spacing: 0.5rem;
  color: #4fc3f7;
  text-shadow: 0 0 40px rgba(79,195,247,0.9), 0 0 80px rgba(79,195,247,0.4);
}

#qr-row {
  display: flex;
  gap: min(10vw, 100px);
  align-items: flex-start;
  justify-content: center;
  position: relative;
}
#qr-row::after {
  content: 'VS';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.65rem;
  letter-spacing: 0.3rem;
  color: #2a2a2a;
}

.player-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.player-card .label {
  font-size: 0.75rem;
  letter-spacing: 0.4rem;
  color: #888;
}
.qr-wrap {
  background: #fff;
  padding: 14px;
  border-radius: 10px;
  border: 4px solid #1e1e1e;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.qr-wrap.connected {
  border-color: #4caf50;
  box-shadow: 0 0 20px rgba(76,175,80,0.3);
}

.status-dot {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.7rem;
  letter-spacing: 0.15rem;
  color: #666;
}
.status-dot::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #333;
  flex-shrink: 0;
}
.status-dot.connected { color: #4caf50; }
.status-dot.connected::before { background: #4caf50; box-shadow: 0 0 6px #4caf50; }

#room-code {
  font-size: 0.75rem;
  letter-spacing: 0.3rem;
  color: #666;
}
#room-code span {
  color: #4fc3f7;
  font-size: 1.4rem;
  letter-spacing: 0.6rem;
  text-shadow: 0 0 20px rgba(79,195,247,0.5);
}

#setup-hint {
  font-size: 0.75rem;
  letter-spacing: 0.15rem;
  color: #555;
  text-align: center;
  max-width: min(80vw, 500px);
  line-height: 1.8;
}
#setup-hint.ready {
  color: #4fc3f7;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Hauptmenü ─────────────────────────────────────────── */
#main-menu {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 40px;
}

.room-badge {
  position: fixed;
  top: 16px; right: 20px;
  font-size: 0.65rem;
  letter-spacing: 0.2rem;
  color: #666;
  z-index: 10;
}
.room-badge span { color: #4fc3f7; }

.menu-section {
  color: #777;
  font-size: 0.65rem;
  letter-spacing: 0.4rem;
  align-self: flex-start;
  margin-top: 10px;
}
.menu-section:first-child { margin-top: 0; }

.menu-item {
  background: #111;
  border: 2px solid #333;
  color: #fff;
  font-family: inherit;
  font-size: 1rem;
  letter-spacing: 0.15rem;
  padding: 18px 28px;
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  width: min(90vw, 380px);
  transition: all 0.1s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.menu-item.selected {
  border-color: #4fc3f7;
  background: #0e1a20;
  box-shadow: 0 0 16px rgba(79,195,247,0.3);
}
.menu-item .badge {
  color: #777;
  font-size: 0.7rem;
}

/* ── Einstellungen ─────────────────────────────────────── */
#settings {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 40px;
}
#settings h2 {
  font-size: 0.8rem;
  letter-spacing: 0.4rem;
  font-weight: normal;
  color: #888;
}

/* ── Game-View ─────────────────────────────────────────── */
#game-view {
  position: fixed; inset: 0;
  background: #000;
}
#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#exit-hint {
  position: fixed; top: 12px; left: 12px;
  color: #333;
  font-size: 0.6rem;
  letter-spacing: 0.1rem;
  z-index: 5;
}

#footer {
  position: fixed; bottom: 12px; right: 14px;
  color: #222; font-size: 0.6rem; letter-spacing: 0.1rem;
  z-index: 101; pointer-events: none;
}
</style>
</head>
<body>

<!-- ── Setup-Screen (QR-Codes) ───────────────────────── -->
<div class="screen active" id="setup">
  <h1>RETROCON</h1>
  <div id="qr-row">
    <div class="player-card">
      <div class="label">SPIELER 1</div>
      <div class="qr-wrap" id="qr-wrap-1"><div id="qr-1"></div></div>
      <div class="status-dot" id="dot-1">WARTE…</div>
    </div>
    <div class="player-card">
      <div class="label">SPIELER 2</div>
      <div class="qr-wrap" id="qr-wrap-2"><div id="qr-2"></div></div>
      <div class="status-dot" id="dot-2">OPTIONAL</div>
    </div>
  </div>
  <div id="setup-hint">SCANNE DEN QR-CODE MIT DEINEM HANDY</div>
</div>

<!-- ── Hauptmenü ─────────────────────────────────────── -->
<div class="screen" id="main-menu">
  <h1 style="color:#4fc3f7;letter-spacing:0.5rem;font-size:clamp(1.2rem,3.5vw,2rem);text-shadow:0 0 40px rgba(79,195,247,0.9),0 0 80px rgba(79,195,247,0.4);margin-bottom:10px">RETROCON</h1>
  <div class="menu-section">SPIELE</div>
  <button class="menu-item selected" data-action="game" data-game="pong">PONG <span class="badge">1–2 SPIELER</span></button>
  <div class="menu-section">CONTROLLER</div>
  <button class="menu-item" data-action="connect">SPIELER VERBINDEN <span class="badge">↗</span></button>
</div>

<!-- ── Einstellungen ─────────────────────────────────── -->
<div class="screen" id="settings">
  <div class="room-badge">RAUM <span id="settings-badge-code"></span></div>
  <h2>SPIELER HINZUFÜGEN</h2>
  <div id="qr-row-s">
    <div class="player-card">
      <div class="label">SPIELER 1</div>
      <div class="qr-wrap" id="qr-wrap-s1"><div id="qr-s1"></div></div>
      <div class="status-dot" id="dot-s1">WARTE…</div>
    </div>
    <div class="player-card">
      <div class="label">SPIELER 2</div>
      <div class="qr-wrap" id="qr-wrap-s2"><div id="qr-s2"></div></div>
      <div class="status-dot" id="dot-s2">OPTIONAL</div>
    </div>
  </div>
  <button class="menu-item" data-action="back" style="margin-top:10px">ZURÜCK <span class="badge">B</span></button>
</div>

<!-- ── Game-View ─────────────────────────────────────── -->
<div id="game-view" style="display:none">
  <canvas id="game-canvas"></canvas>
  <div id="exit-hint">SELECT = MENÜ</div>
</div>

<div id="footer">v0.3.0</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="games/pong.js"></script>
<script>
const ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
function genCode() {
  let s = '';
  for (let i = 0; i < 4; i++) s += ALPHABET[Math.floor(Math.random() * ALPHABET.length)];
  return s;
}

let code = '';
let peer = null;
const conns = new Map();
const lastInput = new Map();
const prevInput = new Map();

let activeScreen = 'setup';

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(name);
  if (el) el.classList.add('active');
  activeScreen = name;
}

// ── PeerJS-Setup ─────────────────────────────────────────
function setupPeer(attempt = 0) {
  code = genCode();
  peer = new Peer('console-' + code);

  peer.on('open', () => {
    const base = location.href.replace(/console\.html.*$/, '');
    const url1 = `${base}controller.html?code=${code}&player=1`;
    const url2 = `${base}controller.html?code=${code}&player=2`;

    document.getElementById('settings-badge-code').textContent = code;

    const qrOpts = { width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M };
    new QRCode(document.getElementById('qr-1'),  { ...qrOpts, text: url1 });
    new QRCode(document.getElementById('qr-2'),  { ...qrOpts, text: url2 });
    new QRCode(document.getElementById('qr-s1'), { ...qrOpts, text: url1 });
    new QRCode(document.getElementById('qr-s2'), { ...qrOpts, text: url2 });
  });

  peer.on('error', err => {
    if (err.type === 'unavailable-id' && attempt < 5) { peer.destroy(); setupPeer(attempt + 1); }
  });

  peer.on('connection', conn => {
    const player = conn.metadata?.player || 1;
    if (conns.has(player)) { try { conns.get(player).close(); } catch {} }
    conns.set(player, conn);

    conn.on('open',  () => setPlayerConnected(player, true));
    conn.on('close', () => {
      if (conns.get(player) === conn) {
        conns.delete(player); lastInput.delete(player);
        setPlayerConnected(player, false);
        currentGame?.onDisconnect?.(player);
      }
    });
    conn.on('data', data => {
      if (data?.type !== 'gamepad') return;
      prevInput.set(player, lastInput.get(player) ?? null);
      lastInput.set(player, data);
      if (currentGame) currentGame.input?.(player, data, prevInput.get(player));
      else handleMenuInput(player, data, prevInput.get(player));
    });
  });
}

function setPlayerConnected(player, on) {
  const wrap = document.getElementById(`qr-wrap-${player}`);
  const dot  = document.getElementById(`dot-${player}`);
  if (wrap) wrap.classList.toggle('connected', on);
  if (dot)  { dot.classList.toggle('connected', on); dot.textContent = on ? 'VERBUNDEN' : (player === 2 ? 'OPTIONAL' : 'WARTE…'); }
  const hint = document.getElementById('setup-hint');
  if (hint) {
    if (conns.size > 0) {
      hint.classList.add('ready');
      hint.textContent = 'DRÜCKE A ZUM STARTEN';
    } else {
      hint.classList.remove('ready');
      hint.textContent = 'SCANNE DEN QR-CODE MIT DEINEM HANDY';
    }
  }
}

setupPeer();


// ── Menü-Navigation ──────────────────────────────────────
const menuItems = () => [...document.querySelectorAll(`#${activeScreen} .menu-item`)];
let menuIdx = 0;

function highlightMenu() {
  const items = menuItems();
  items.forEach((el, i) => el.classList.toggle('selected', i === menuIdx));
}

function handleMenuInput(player, gp, prev) {
  if (player !== 1) return;
  // Setup-Screen: START per Controller
  if (activeScreen === 'setup') {
    if ((gp.a && !prev?.a) && conns.size > 0) { showScreen('main-menu'); menuIdx = 0; highlightMenu(); }
    return;
  }
  const items = menuItems();
  if (gp.dpad.down && !prev?.dpad?.down) { menuIdx = (menuIdx + 1) % items.length; highlightMenu(); }
  if (gp.dpad.up   && !prev?.dpad?.up)   { menuIdx = (menuIdx - 1 + items.length) % items.length; highlightMenu(); }
  if (gp.a && !prev?.a) activateItem(items[menuIdx]);
  if (gp.b && !prev?.b && activeScreen !== 'main-menu') { showScreen('main-menu'); menuIdx = 0; highlightMenu(); }
}

document.querySelectorAll('.menu-item').forEach((el, i) => {
  el.addEventListener('click', () => {
    menuIdx = [...el.parentElement.querySelectorAll('.menu-item')].indexOf(el);
    activateItem(el);
  });
});

function activateItem(el) {
  if (!el) return;
  const action = el.dataset.action;
  if (action === 'game')    { menuIdx = 0; startGame(el.dataset.game); }
  if (action === 'connect') { menuIdx = 0; showScreen('setup'); highlightMenu(); }
  if (action === 'back')    { menuIdx = 1; showScreen('main-menu'); highlightMenu(); }
}

highlightMenu();

// ── Game-Loader ──────────────────────────────────────────
let currentGame = null, rafId = null;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const gameView = document.getElementById('game-view');

function resizeCanvas() {
  canvas.width  = canvas.clientWidth  * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
}
window.addEventListener('resize', () => { resizeCanvas(); currentGame?.resize?.(canvas.width, canvas.height); });

function startGame(name) {
  const mod = window.RetroGames?.[name];
  if (!mod) return;
  gameView.style.display = 'block';
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  resizeCanvas();
  currentGame = mod.create(ctx, canvas.width, canvas.height, Math.max(1, conns.size), {
    exit: exitGame,
    getConns: () => conns,
    code
  });
  for (const [p, gp] of lastInput) currentGame.input?.(p, gp, null);
  let last = performance.now();
  (function loop(now) {
    const dt = Math.min(50, now - last) / 1000; last = now;
    currentGame.update?.(dt);
    currentGame.draw?.();
    rafId = requestAnimationFrame(loop);
  })(performance.now());
}

function exitGame() {
  cancelAnimationFrame(rafId);
  currentGame?.destroy?.();
  currentGame = null;
  gameView.style.display = 'none';
  showScreen('main-menu');
  menuIdx = 0; highlightMenu();
}
</script>
</body>
</html>
