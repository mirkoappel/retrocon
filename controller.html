<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Controller</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --color: #4fc3f7; }

body {
  background: #2a2a2a;
  width: 100dvw;
  height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  font-family: 'Courier New', monospace;
}

/* ── Portrait: Drehhinweis ──────────────────────────────── */
#rotate-hint {
  display: none;
  position: fixed; inset: 0;
  background: #111;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  color: #888;
  z-index: 10;
}
#rotate-hint span { font-size: 0.75rem; letter-spacing: 0.2rem; }
#rotate-icon {
  width: 44px; height: 60px;
  border: 2px solid #555;
  border-radius: 6px;
  animation: rot 2.5s ease-in-out infinite;
}
@keyframes rot { 0%,35%,100%{transform:rotate(0deg)} 60%,85%{transform:rotate(90deg)} }

@media (orientation: portrait) {
  #rotate-hint { display: flex; }
  #layout      { display: none; }
}

/* ── Status LED ─────────────────────────────────────────── */
#led {
  position: fixed; top: 10px; right: 12px; z-index: 5;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #f44336;
  box-shadow: 0 0 8px #f44336;
  transition: background 0.3s, box-shadow 0.3s;
}
#led.connected {
  background: #4caf50;
  box-shadow: 0 0 8px #4caf50;
}

/* ── Haupt-Layout ───────────────────────────────────────── */
#layout {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: 5fr 2fr 5fr;
}

/* ── Joystick-Bereich ───────────────────────────────────── */
#joystick-area {
  position: relative;
  overflow: hidden;
  touch-action: none;
  background: #2a2a2a;
}

#joystick-base {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

#joystick-thumb {
  position: absolute;
  border-radius: 50%;
  background: #8C1F3E;
  box-shadow: 0 4px 0 #5a1128, 0 6px 20px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%);
  pointer-events: none;
  transition: left 0.04s, top 0.04s;
}
#joystick-area.dragging #joystick-thumb { transition: none; }

/* ── Mitte ──────────────────────────────────────────────── */
#mid {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: #272727;
  border-left: 1px solid #1e1e1e;
  border-right: 1px solid #1e1e1e;
}

.sys-btn {
  background: #1e1e1e;
  border: none;
  border-radius: 30px;
  padding: 7px 18px;
  color: #666;
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.07rem;
  cursor: pointer;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.7);
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.04s, box-shadow 0.04s;
  width: 80%;
  text-align: center;
}
.sys-btn.active { color: #aaa; box-shadow: inset 0 1px 2px rgba(0,0,0,0.9); }

.stripe {
  width: 50%; height: 2px;
  background: linear-gradient(90deg, transparent, #1e1e1e, transparent);
}

/* ── Aktions-Buttons A + B ─────────────────────────────── */
#actions-area {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #2a2a2a;
}

#actions {
  --btn: min(16vw, 28vh);
  position: relative;
  width: calc(var(--btn) * 2.4);
  height: calc(var(--btn) * 1.8);
}

.act-btn {
  position: absolute;
  width: var(--btn);
  height: var(--btn);
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace;
  font-size: min(4vw, 1.4rem);
  font-weight: bold;
  color: rgba(0,0,0,0.3);
  background: #8C1F3E;
  box-shadow: 0 min(1.2vw,8px) 0 #5a1128, 0 min(1.5vw,10px) min(3vw,20px) rgba(0,0,0,0.5);
  transition: box-shadow 0.04s, transform 0.04s, filter 0.04s;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
.act-btn.active {
  box-shadow: 0 2px 0 #5a1128, 0 3px 8px rgba(0,0,0,0.4);
  transform: translateY(min(1vw,6px));
  filter: brightness(0.8);
}
#btn-b { bottom: 0; left: 0; }
#btn-a { top: 0;    right: 0; }

/* ── QR-Scan Overlay ────────────────────────────────────── */
#scan-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: #000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#scan-overlay.active { display: flex; }
#scan-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
#scan-frame {
  position: relative; z-index: 2;
  width: min(60vw, 60vh);
  height: min(60vw, 60vh);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
}
#scan-hint {
  position: relative; z-index: 2;
  margin-top: 20px;
  font-size: 0.7rem; letter-spacing: 0.1rem;
  color: rgba(255,255,255,0.5);
}

#scan-close {
  position: absolute; top: 16px; right: 16px; z-index: 3;
  background: rgba(0,0,0,0.6);
  border: 1px solid #333;
  color: #aaa;
  font-family: 'Courier New', monospace;
  font-size: 0.6rem; letter-spacing: 0.1rem;
  padding: 6px 14px; border-radius: 20px;
  cursor: pointer; touch-action: none;
}
#scan-canvas { display: none; }

#version {
  position: fixed; bottom: 6px; right: 8px;
  font-size: 0.5rem; color: #333;
  pointer-events: none;
}

/* ── Code-Eingabe ──────────────────────────────────────── */
#code-screen {
  display: none;
  position: fixed; inset: 0; z-index: 50;
  background: #0a0a0a;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 32px;
}
#code-screen.active { display: flex; }

#code-screen h1 {
  font-size: clamp(1.6rem, 6vw, 2.4rem);
  letter-spacing: 0.5rem;
  text-shadow: 0 0 24px rgba(79,195,247,0.5), 0 0 4px rgba(79,195,247,0.8);
  margin-bottom: 4px;
}
#code-screen .subtitle {
  color: #666;
  font-size: 0.65rem;
  letter-spacing: 0.35rem;
  margin-bottom: 8px;
}

#code-scan-btn {
  background: #0e1a20;
  border: 2px solid #4fc3f7;
  color: #4fc3f7;
  font-family: 'Courier New', monospace;
  font-size: 1rem;
  letter-spacing: 0.2rem;
  padding: 18px 28px;
  border-radius: 6px;
  cursor: pointer;
  width: min(80vw, 320px);
  box-shadow: 0 0 16px rgba(79,195,247,0.15);
}

.code-divider {
  color: #333;
  font-size: 0.65rem;
  letter-spacing: 0.3rem;
}

#code-input {
  background: #111;
  border: 2px solid #333;
  color: #4fc3f7;
  font-family: 'Courier New', monospace;
  font-size: 2rem;
  letter-spacing: 0.6rem;
  padding: 14px 20px;
  width: min(80vw, 320px);
  border-radius: 6px;
  text-align: center;
  text-transform: uppercase;
  text-shadow: 0 0 12px rgba(79,195,247,0.6);
}
#code-input:focus {
  outline: none;
  border-color: #4fc3f7;
  box-shadow: 0 0 16px rgba(79,195,247,0.3);
}
#code-input::placeholder { color: #222; letter-spacing: 0.6rem; }

#code-submit {
  background: #111;
  border: 2px solid #333;
  color: #aaa;
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
  letter-spacing: 0.15rem;
  padding: 14px 28px;
  border-radius: 6px;
  cursor: pointer;
  width: min(80vw, 320px);
}
#code-error { color: #f44336; font-size: 0.7rem; letter-spacing: 0.1rem; min-height: 1em; }
</style>
</head>
<body>

<div id="rotate-hint">
  <div id="rotate-icon"></div>
  <span>PHONE DREHEN</span>
</div>

<div id="led"></div>

<div id="layout">
  <div id="joystick-area">
    <div id="joystick-base"></div>
    <div id="joystick-thumb"></div>
  </div>

  <div id="mid">
    <button class="sys-btn" id="btn-select">SELECT</button>
    <div class="stripe"></div>
    <button class="sys-btn" id="btn-start">START</button>
    <div class="stripe"></div>
    <button class="sys-btn" id="btn-scan">⟳ QR</button>
  </div>

  <div id="actions-area">
    <div id="actions">
      <button class="act-btn" id="btn-b">B</button>
      <button class="act-btn" id="btn-a">A</button>
    </div>
  </div>
</div>

<div id="scan-overlay">
  <video id="scan-video" playsinline muted></video>
  <canvas id="scan-canvas"></canvas>
  <div id="scan-frame"></div>
  <div id="scan-hint">QR-Code des Raums scannen</div>
  <button id="scan-close">SCHLIESSEN</button>
</div>

<div id="code-screen">
  <h1>RETROCON</h1>
  <div class="subtitle">HANDY ALS CONTROLLER</div>
  <button id="code-scan-btn">QR-CODE SCANNEN</button>
  <div class="code-divider">– ODER –</div>
  <input id="code-input" maxlength="4" placeholder="• • • •" autocapitalize="characters" autocomplete="off">
  <div id="code-error"></div>
  <button id="code-submit">VERBINDEN</button>
</div>

<div id="version">v0.2.0</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const CODE_ALPHABET = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
const CODE_RE = /^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{4}$/;

const params = new URLSearchParams(location.search);
let player   = parseInt(params.get('player')) || 1;
let code     = (params.get('code') || '').toUpperCase();
let gamePeerId = params.get('peer'); // Legacy-Support

if (code && !CODE_RE.test(code)) code = '';
if (code) gamePeerId = 'console-' + code;

const color = player === 1 ? '#4fc3f7' : '#ef9a9a';
document.documentElement.style.setProperty('--color', color);

const led        = document.getElementById('led');
const connStatus = { set className(v) { led.classList.toggle('connected', v === 'connected'); } };
let conn = null;

// ── Gamepad-State ────────────────────────────────────────
const gp = { jx: 0, jy: 0, jactive: false, up: false, down: false, left: false, right: false, a: false, b: false, select: false, start: false };

function send() {
  if (conn?.open) conn.send({ type: 'gamepad', player,
    joystick: { x: gp.jx, y: gp.jy, active: gp.jactive },
    dpad: { up: gp.up, down: gp.down, left: gp.left, right: gp.right },
    a: gp.a, b: gp.b, select: gp.select, start: gp.start });
}

// ── Joystick (fixer Mittelpunkt) ─────────────────────────
const joystickArea  = document.getElementById('joystick-area');
const joystickBase  = document.getElementById('joystick-base');
const joystickThumb = document.getElementById('joystick-thumb');

let joystickTouchId = null;
let jCx = 0, jCy = 0, jMaxR = 0;

function layoutJoystick() {
  const r = joystickArea.getBoundingClientRect();
  jCx   = r.width  / 2;
  jCy   = r.height / 2;
  jMaxR = Math.min(r.width, r.height) * 0.42;
  const baseSize = jMaxR * 2;
  const thumbSize = Math.min(r.width, r.height) * 0.22;
  joystickBase.style.cssText  = `width:${baseSize}px;height:${baseSize}px;left:${jCx}px;top:${jCy}px`;
  joystickThumb.style.cssText = `width:${thumbSize}px;height:${thumbSize}px;left:${jCx}px;top:${jCy}px;box-shadow:0 ${thumbSize*0.1}px 0 #5a1128,0 ${thumbSize*0.15}px ${thumbSize*0.5}px rgba(0,0,0,0.6)`;
}
layoutJoystick();
window.addEventListener('resize', layoutJoystick);

function joystickMove(touch) {
  const r  = joystickArea.getBoundingClientRect();
  const dx = (touch.clientX - r.left) - jCx;
  const dy = (touch.clientY - r.top)  - jCy;
  const dist  = Math.sqrt(dx * dx + dy * dy);
  const ratio = Math.min(dist, jMaxR) / (dist || 1);

  joystickThumb.style.left = (jCx + dx * ratio) + 'px';
  joystickThumb.style.top  = (jCy + dy * ratio) + 'px';

  gp.jx = (dx * ratio) / jMaxR;
  gp.jy = (dy * ratio) / jMaxR;
  const t = 0.35;
  gp.up    = gp.jy < -t;
  gp.down  = gp.jy >  t;
  gp.left  = gp.jx < -t;
  gp.right = gp.jx >  t;
  send();
}

function joystickRelease() {
  joystickTouchId = null;
  joystickArea.classList.remove('dragging');
  joystickThumb.style.left = jCx + 'px';
  joystickThumb.style.top  = jCy + 'px';
  gp.jx = gp.jy = 0;
  gp.jactive = false;
  gp.up = gp.down = gp.left = gp.right = false;
  send();
}

joystickArea.addEventListener('touchstart', e => {
  e.preventDefault();
  if (joystickTouchId !== null) return;
  joystickTouchId = e.changedTouches[0].identifier;
  joystickArea.classList.add('dragging');
  gp.jactive = true;
  joystickMove(e.changedTouches[0]);
}, { passive: false });

joystickArea.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystickTouchId) joystickMove(t);
  }
}, { passive: false });

['touchend','touchcancel'].forEach(ev =>
  joystickArea.addEventListener(ev, e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joystickTouchId) joystickRelease();
    }
  }, { passive: false })
);

// ── Buttons ──────────────────────────────────────────────
function bindBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart',  e => { e.preventDefault(); gp[key] = true;  el.classList.add('active');    send(); }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); gp[key] = false; el.classList.remove('active'); send(); }, { passive: false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); gp[key] = false; el.classList.remove('active'); send(); }, { passive: false });
}
bindBtn('btn-a',      'a');
bindBtn('btn-b',      'b');
bindBtn('btn-select', 'select');
bindBtn('btn-start',  'start');

// ── PeerJS ───────────────────────────────────────────────
function connect() {
  if (!gamePeerId) { showCodeScreen(); return; }
  const peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(gamePeerId, { metadata: { player } });
    conn.on('open',  () => { connStatus.className = 'connected'; });
    conn.on('close', () => { connStatus.className = 'error'; setTimeout(() => location.reload(), 2000); });
  });
  peer.on('error', () => { connStatus.className = 'error'; setTimeout(() => location.reload(), 3000); });
}
connect();

// ── Wake Lock ────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); } catch {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });

setInterval(send, 33);

// ── QR-Scanner ───────────────────────────────────────────
const scanOverlay = document.getElementById('scan-overlay');
const scanVideo   = document.getElementById('scan-video');
const scanCanvas  = document.getElementById('scan-canvas');
const scanCtx     = scanCanvas.getContext('2d', { willReadFrequently: true });
let scanStream = null, scanRaf = null;

document.getElementById('btn-scan').addEventListener('touchstart', e => {
  e.preventDefault();
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(stream => { scanStream = stream; scanVideo.srcObject = stream; return scanVideo.play(); })
    .then(() => { scanOverlay.classList.add('active'); scanLoop(); })
    .catch(err => alert('Kamera nicht verfügbar: ' + err.message));
}, { passive: false });

document.getElementById('scan-close').addEventListener('touchstart', e => {
  e.preventDefault(); stopScan();
}, { passive: false });

function stopScan() {
  scanOverlay.classList.remove('active');
  cancelAnimationFrame(scanRaf);
  scanStream?.getTracks().forEach(t => t.stop());
  scanStream = null;
}

function scanLoop() {
  if (!scanStream) return;
  if (scanVideo.readyState === 4) {
    scanCanvas.width  = scanVideo.videoWidth;
    scanCanvas.height = scanVideo.videoHeight;
    scanCtx.drawImage(scanVideo, 0, 0);
    const img  = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code?.data) {
      try {
        const url = new URL(code.data);
        if (url.searchParams.has('code') || url.searchParams.has('peer')) {
          stopScan(); location.href = code.data; return;
        }
      } catch {}
    }
  }
  scanRaf = requestAnimationFrame(scanLoop);
}

// ── Code-Eingabe-Screen ─────────────────────────────────
const codeScreen = document.getElementById('code-screen');
const codeInput  = document.getElementById('code-input');
const codeError  = document.getElementById('code-error');

function showCodeScreen() {
  codeScreen.classList.add('active');
  setTimeout(() => codeInput.focus(), 50);
}

function submitCode() {
  const v = codeInput.value.trim().toUpperCase();
  if (!CODE_RE.test(v)) { codeError.textContent = '4-STELLIGEN CODE EINGEBEN'; return; }
  location.href = `controller.html?code=${v}&player=${player}`;
}

codeInput.addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^ABCDEFGHJKLMNPQRSTUVWXYZ23456789]/g, '');
});
codeInput.addEventListener('keypress', e => { if (e.key === 'Enter') submitCode(); });
document.getElementById('code-submit').addEventListener('click', submitCode);
document.getElementById('code-scan-btn').addEventListener('touchstart', e => {
  e.preventDefault();
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(stream => { scanStream = stream; scanVideo.srcObject = stream; return scanVideo.play(); })
    .then(() => { scanOverlay.classList.add('active'); scanLoop(); })
    .catch(err => alert('Kamera nicht verfügbar: ' + err.message));
}, { passive: false });
</script>
</body>
</html>
