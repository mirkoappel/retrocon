<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Controller</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --color: #4fc3f7; }

body {
  background: #0f0f0f;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  font-family: 'Courier New', monospace;
  touch-action: none;
}

/* Portrait: Hinweis zum Drehen */
#rotate-hint {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  color: #333;
}
#rotate-hint span { font-size: 0.7rem; letter-spacing: 0.2rem; }
#rotate-icon {
  width: 44px; height: 60px;
  border: 2px solid #2a2a2a;
  border-radius: 6px;
  animation: rot 2.5s ease-in-out infinite;
}
@keyframes rot { 0%,35%,100%{transform:rotate(0deg)} 60%,85%{transform:rotate(90deg)} }

@media (orientation: portrait) {
  #rotate-hint  { display: flex; }
  #gamepad-wrap { display: none; }
}

/* Status */
#gamepad-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
#status-bar {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.6rem; letter-spacing: 0.1rem;
}
#player-label { color: #2a2a2a; }
#player-num   { color: var(--color); font-size: 0.75rem; font-weight: bold; }
#conn-status  { display: flex; align-items: center; gap: 5px; color: #2a2a2a; transition: color 0.3s; }
#conn-status.connected { color: #4caf50; }
#conn-status.error     { color: #f44336; }
#status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
#conn-status.connected #status-dot { animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* NES Controller Body */
#nes {
  position: relative;
  background: linear-gradient(175deg, #3d3d3d 0%, #2b2b2b 100%);
  border-radius: 16px 16px 40% 40% / 16px 16px 22px 22px;
  width: min(90vw, 560px);
  height: min(40vw, 220px);
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  padding: 0 30px;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.9),
    inset 0 1px 0 rgba(255,255,255,0.07),
    inset 0 -4px 8px rgba(0,0,0,0.5);
}

/* Dekorativer Riegel oben (NES-typisch) */
#nes::before {
  content: '';
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  width: 72px; height: 7px;
  background: #222;
  border-radius: 4px;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
}

/* ── D-Pad ─────────────────────────────────────────────── */
#dpad {
  position: relative;
  width: 114px;
  height: 114px;
  flex-shrink: 0;
  touch-action: none;
}

/* Kreuz-Segmente */
.dp {
  position: absolute;
  background: #181818;
  transition: background 0.04s, filter 0.04s;
}
.dp.active { background: #101010; filter: brightness(1.8); }

#dp-c { top: 38px; left: 38px; width: 38px; height: 38px; }
#dp-u { top:  0;   left: 38px; width: 38px; height: 38px; border-radius: 5px 5px 0 0; }
#dp-d { top: 76px; left: 38px; width: 38px; height: 38px; border-radius: 0 0 5px 5px; }
#dp-l { top: 38px; left:  0;   width: 38px; height: 38px; border-radius: 5px 0 0 5px; }
#dp-r { top: 38px; left: 76px; width: 38px; height: 38px; border-radius: 0 5px 5px 0; }

/* Pfeil-Indikatoren */
.dpa {
  position: absolute;
  width: 0; height: 0;
  pointer-events: none;
  opacity: 0.18;
  transition: opacity 0.04s;
  z-index: 2;
}
.dpa.active { opacity: 0.85; }
#a-u { top: 9px;    left: 50%;  transform: translateX(-50%); border: 6px solid transparent; border-bottom-color: #ccc; }
#a-d { bottom: 9px; left: 50%;  transform: translateX(-50%); border: 6px solid transparent; border-top-color: #ccc; }
#a-l { left: 9px;   top: 50%;   transform: translateY(-50%); border: 6px solid transparent; border-right-color: #ccc; }
#a-r { right: 9px;  top: 50%;   transform: translateY(-50%); border: 6px solid transparent; border-left-color: #ccc; }

/* ── Mitte: SELECT + START ─────────────────────────────── */
#middle {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 0 6px;
}
.sys-row { display: flex; gap: 14px; }
.sys-btn {
  background: #1e1e1e;
  border: none;
  border-radius: 30px;
  padding: 5px 14px 6px;
  color: #3a3a3a;
  font-family: 'Courier New', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.07rem;
  cursor: pointer;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.02);
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.04s, box-shadow 0.04s;
}
.sys-btn.active { color: #555; box-shadow: inset 0 1px 2px rgba(0,0,0,0.9); }

.stripe {
  width: 56px; height: 2px;
  background: linear-gradient(90deg, transparent, #1e1e1e, transparent);
}

/* ── Aktions-Buttons A + B ─────────────────────────────── */
#actions {
  position: relative;
  width: 114px;
  height: 90px;
  flex-shrink: 0;
}
.act-btn {
  position: absolute;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace;
  font-size: 0.85rem; font-weight: bold;
  color: rgba(0,0,0,0.3);
  background: #8C1F3E;
  box-shadow: 0 5px 0 #5a1128, 0 7px 16px rgba(0,0,0,0.5);
  transition: box-shadow 0.04s, transform 0.04s, filter 0.04s;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
.act-btn.active {
  box-shadow: 0 1px 0 #5a1128, 0 2px 6px rgba(0,0,0,0.4);
  transform: translateY(4px);
  filter: brightness(0.8);
}
/* NES: B links-unten, A rechts-oben (leicht diagonal) */
#btn-b { bottom: 0; left: 6px; }
#btn-a { top: 0;    right: 6px; }

#version {
  position: fixed; bottom: 8px; right: 10px;
  font-size: 0.55rem; color: #222;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="rotate-hint">
  <div id="rotate-icon"></div>
  <span>PHONE DREHEN</span>
</div>

<div id="gamepad-wrap">
  <div id="status-bar">
    <span id="player-label">SPIELER</span>
    <span id="player-num">?</span>
    <div id="conn-status">
      <div id="status-dot"></div>
      <span id="status-text">Verbinde...</span>
    </div>
  </div>

  <div id="nes">
    <div id="dpad">
      <div class="dp" id="dp-c"></div>
      <div class="dp" id="dp-u"></div>
      <div class="dp" id="dp-d"></div>
      <div class="dp" id="dp-l"></div>
      <div class="dp" id="dp-r"></div>
      <div class="dpa" id="a-u"></div>
      <div class="dpa" id="a-d"></div>
      <div class="dpa" id="a-l"></div>
      <div class="dpa" id="a-r"></div>
    </div>

    <div id="middle">
      <div class="sys-row">
        <button class="sys-btn" id="btn-select">SELECT</button>
        <button class="sys-btn" id="btn-start">START</button>
      </div>
      <div class="stripe"></div>
    </div>

    <div id="actions">
      <button class="act-btn" id="btn-b">B</button>
      <button class="act-btn" id="btn-a">A</button>
    </div>
  </div>
</div>

<div id="version">v0.0.6</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
const params     = new URLSearchParams(location.search);
const player     = parseInt(params.get('player')) || 1;
const gamePeerId = params.get('peer');

const color = player === 1 ? '#4fc3f7' : '#ef9a9a';
document.documentElement.style.setProperty('--color', color);
document.getElementById('player-num').textContent = player;

const connStatus = document.getElementById('conn-status');
const statusText = document.getElementById('status-text');
let conn = null;

// ── Gamepad-State ────────────────────────────────────────
const gp = { up: false, down: false, left: false, right: false, a: false, b: false, select: false, start: false };

function send() {
  if (conn?.open) conn.send({ type: 'gamepad', player,
    dpad: { up: gp.up, down: gp.down, left: gp.left, right: gp.right },
    a: gp.a, b: gp.b, select: gp.select, start: gp.start });
}

// ── D-Pad Touch ──────────────────────────────────────────
const dpad   = document.getElementById('dpad');
const dpEls  = { up: document.getElementById('dp-u'), down: document.getElementById('dp-d'), left: document.getElementById('dp-l'), right: document.getElementById('dp-r') };
const arEls  = { up: document.getElementById('a-u'),  down: document.getElementById('a-d'),  left: document.getElementById('a-l'),  right: document.getElementById('a-r') };

const activeIds = new Map();

function dirFrom(touch) {
  const r  = dpad.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  const dx = touch.clientX - cx,   dy = touch.clientY - cy;
  const zone = r.width / 4;
  return { up: dy < -zone, down: dy > zone, left: dx < -zone, right: dx > zone };
}

function refreshDpad() {
  const dirs = { up: false, down: false, left: false, right: false };
  for (const d of activeIds.values()) {
    if (d.up)    dirs.up    = true;
    if (d.down)  dirs.down  = true;
    if (d.left)  dirs.left  = true;
    if (d.right) dirs.right = true;
  }
  gp.up = dirs.up; gp.down = dirs.down; gp.left = dirs.left; gp.right = dirs.right;
  for (const dir of ['up','down','left','right']) {
    dpEls[dir].classList.toggle('active', dirs[dir]);
    arEls[dir].classList.toggle('active', dirs[dir]);
  }
  send();
}

['touchstart','touchmove'].forEach(ev =>
  dpad.addEventListener(ev, e => {
    e.preventDefault();
    for (const t of e.changedTouches) activeIds.set(t.identifier, dirFrom(t));
    refreshDpad();
  }, { passive: false })
);
['touchend','touchcancel'].forEach(ev =>
  dpad.addEventListener(ev, e => {
    e.preventDefault();
    for (const t of e.changedTouches) activeIds.delete(t.identifier);
    refreshDpad();
  }, { passive: false })
);

// ── Buttons ──────────────────────────────────────────────
function bindBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart',  e => { e.preventDefault(); gp[key] = true;  el.classList.add('active');    send(); }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); gp[key] = false; el.classList.remove('active'); send(); }, { passive: false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); gp[key] = false; el.classList.remove('active'); send(); }, { passive: false });
}
bindBtn('btn-a',      'a');
bindBtn('btn-b',      'b');
bindBtn('btn-select', 'select');
bindBtn('btn-start',  'start');

// ── PeerJS ───────────────────────────────────────────────
function connect() {
  if (!gamePeerId) { statusText.textContent = 'Kein Spiel – QR neu scannen'; connStatus.className = 'error'; return; }
  const peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(gamePeerId, { metadata: { player } });
    conn.on('open',  () => { statusText.textContent = 'Verbunden ✓'; connStatus.className = 'connected'; });
    conn.on('close', () => { statusText.textContent = 'Getrennt – lade neu...'; connStatus.className = 'error'; setTimeout(() => location.reload(), 2000); });
  });
  peer.on('error', () => { statusText.textContent = 'Verbindungsfehler'; connStatus.className = 'error'; setTimeout(() => location.reload(), 3000); });
}
connect();

// ── Wake Lock ────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); } catch {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });

setInterval(send, 33);
</script>
</body>
</html>
