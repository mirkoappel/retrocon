<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Controller</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --color: #4fc3f7; }

body {
  background: #2a2a2a;
  width: 100dvw;
  height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  font-family: 'Courier New', monospace;
}

/* ── Portrait: Drehhinweis ──────────────────────────────── */
#rotate-hint {
  display: none;
  position: fixed; inset: 0;
  background: #1a1a1a;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  color: #333;
}
#rotate-hint span { font-size: 0.75rem; letter-spacing: 0.2rem; }
#rotate-icon {
  width: 44px; height: 60px;
  border: 2px solid #2a2a2a;
  border-radius: 6px;
  animation: rot 2.5s ease-in-out infinite;
}
@keyframes rot { 0%,35%,100%{transform:rotate(0deg)} 60%,85%{transform:rotate(90deg)} }

@media (orientation: portrait) {
  #rotate-hint  { display: flex; }
  #layout       { display: none; }
}

/* ── Haupt-Layout ───────────────────────────────────────── */
#layout {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: auto 1fr;
  grid-template-columns: 5fr 2fr 5fr;
  grid-template-areas:
    "hdr hdr hdr"
    "dpad mid actions";
}

/* ── Header ─────────────────────────────────────────────── */
#hdr {
  grid-area: hdr;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 8px 16px;
  background: #222;
  border-bottom: 1px solid #1a1a1a;
  font-size: 0.6rem;
  letter-spacing: 0.12rem;
}
#player-label { color: #333; }
#player-num   { color: var(--color); font-weight: bold; }
#conn-status  { display: flex; align-items: center; gap: 5px; color: #333; transition: color 0.3s; }
#conn-status.connected { color: #4caf50; }
#conn-status.error     { color: #f44336; }
#status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
#conn-status.connected #status-dot { animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── D-Pad-Bereich ──────────────────────────────────────── */
#dpad-area {
  grid-area: dpad;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #2a2a2a;
}

#dpad {
  --sz: min(38vw, 70vh);
  position: relative;
  width: var(--sz);
  height: var(--sz);
  touch-action: none;
}

.dp {
  position: absolute;
  background: #1e1e1e;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
  transition: background 0.04s, filter 0.04s;
}
.dp.active { background: #161616; filter: brightness(2); }

/* Kreuz: je 1/3 der Gesamtgröße */
#dp-c { top: 33.33%; left: 33.33%; width: 33.34%; height: 33.34%; }
#dp-u { top: 0;      left: 33.33%; width: 33.34%; height: 33.33%; border-radius: 10px 10px 0 0; }
#dp-d { top: 66.67%; left: 33.33%; width: 33.34%; height: 33.33%; border-radius: 0 0 10px 10px; }
#dp-l { top: 33.33%; left: 0;      width: 33.33%; height: 33.34%; border-radius: 10px 0 0 10px; }
#dp-r { top: 33.33%; left: 66.67%; width: 33.33%; height: 33.34%; border-radius: 0 10px 10px 0; }

.dpa {
  position: absolute;
  width: 0; height: 0;
  pointer-events: none;
  opacity: 0.15;
  transition: opacity 0.04s;
  z-index: 2;
}
.dpa.active { opacity: 0.8; }
#a-u { top: 12%;  left: 50%; transform: translateX(-50%); border: min(1.8vw,12px) solid transparent; border-bottom-color: #ccc; }
#a-d { bottom: 12%; left: 50%; transform: translateX(-50%); border: min(1.8vw,12px) solid transparent; border-top-color: #ccc; }
#a-l { left: 12%;  top: 50%; transform: translateY(-50%); border: min(1.8vw,12px) solid transparent; border-right-color: #ccc; }
#a-r { right: 12%; top: 50%; transform: translateY(-50%); border: min(1.8vw,12px) solid transparent; border-left-color: #ccc; }

/* ── Mitte ──────────────────────────────────────────────── */
#mid {
  grid-area: mid;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: #272727;
  border-left: 1px solid #1e1e1e;
  border-right: 1px solid #1e1e1e;
}

.sys-btn {
  background: #1e1e1e;
  border: none;
  border-radius: 30px;
  padding: 7px 18px;
  color: #3a3a3a;
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.07rem;
  cursor: pointer;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.7);
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.04s, box-shadow 0.04s;
  width: 80%;
  text-align: center;
}
.sys-btn.active { color: #555; box-shadow: inset 0 1px 2px rgba(0,0,0,0.9); }

.stripe {
  width: 50%; height: 2px;
  background: linear-gradient(90deg, transparent, #1e1e1e, transparent);
}

/* ── QR-Scan Overlay ────────────────────────────────────── */
#scan-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: #000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
#scan-overlay.active { display: flex; }
#scan-video {
  width: 100%; height: 100%;
  object-fit: cover;
  position: absolute; inset: 0;
}
#scan-frame {
  position: relative; z-index: 2;
  width: min(60vw, 60vh);
  height: min(60vw, 60vh);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
}
#scan-hint {
  position: relative; z-index: 2;
  font-size: 0.7rem; letter-spacing: 0.1rem;
  color: rgba(255,255,255,0.5);
}
#scan-close {
  position: absolute; top: 16px; right: 16px; z-index: 3;
  background: rgba(0,0,0,0.6);
  border: 1px solid #333;
  color: #aaa;
  font-family: 'Courier New', monospace;
  font-size: 0.6rem; letter-spacing: 0.1rem;
  padding: 6px 14px; border-radius: 20px;
  cursor: pointer;
  touch-action: none;
}
#scan-canvas { display: none; }

/* ── Aktions-Buttons ────────────────────────────────────── */
#actions-area {
  grid-area: actions;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #2a2a2a;
}

#actions {
  --btn: min(16vw, 28vh);
  position: relative;
  width: calc(var(--btn) * 2.4);
  height: calc(var(--btn) * 1.8);
}

.act-btn {
  position: absolute;
  width: var(--btn);
  height: var(--btn);
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace;
  font-size: min(4vw, 1.4rem);
  font-weight: bold;
  color: rgba(0,0,0,0.3);
  background: #8C1F3E;
  box-shadow: 0 min(1.2vw,8px) 0 #5a1128, 0 min(1.5vw,10px) min(3vw,20px) rgba(0,0,0,0.5);
  transition: box-shadow 0.04s, transform 0.04s, filter 0.04s;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
.act-btn.active {
  box-shadow: 0 2px 0 #5a1128, 0 3px 8px rgba(0,0,0,0.4);
  transform: translateY(min(1vw,6px));
  filter: brightness(0.8);
}
/* B links-unten, A rechts-oben */
#btn-b { bottom: 0; left: 0; }
#btn-a { top: 0;    right: 0; }

#version {
  position: fixed; bottom: 6px; right: 8px;
  font-size: 0.5rem; color: #333;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="rotate-hint">
  <div id="rotate-icon"></div>
  <span>PHONE DREHEN</span>
</div>

<div id="layout">
  <div id="hdr">
    <span id="player-label">SPIELER</span>
    <span id="player-num">?</span>
    <div id="conn-status">
      <div id="status-dot"></div>
      <span id="status-text">Verbinde...</span>
    </div>
  </div>

  <div id="dpad-area">
    <div id="dpad">
      <div class="dp" id="dp-c"></div>
      <div class="dp" id="dp-u"></div>
      <div class="dp" id="dp-d"></div>
      <div class="dp" id="dp-l"></div>
      <div class="dp" id="dp-r"></div>
      <div class="dpa" id="a-u"></div>
      <div class="dpa" id="a-d"></div>
      <div class="dpa" id="a-l"></div>
      <div class="dpa" id="a-r"></div>
    </div>
  </div>

  <div id="mid">
    <button class="sys-btn" id="btn-select">SELECT</button>
    <div class="stripe"></div>
    <button class="sys-btn" id="btn-start">START</button>
    <div class="stripe"></div>
    <button class="sys-btn" id="btn-scan">⟳ QR</button>
  </div>

  <div id="scan-overlay">
    <video id="scan-video" playsinline muted></video>
    <canvas id="scan-canvas"></canvas>
    <div id="scan-frame"></div>
    <div id="scan-hint">QR-Code auf Spielfeld richten</div>
    <button id="scan-close">SCHLIESSEN</button>
  </div>

  <div id="actions-area">
    <div id="actions">
      <button class="act-btn" id="btn-b">B</button>
      <button class="act-btn" id="btn-a">A</button>
    </div>
  </div>
</div>

<div id="version">v0.0.8</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const params     = new URLSearchParams(location.search);
const player     = parseInt(params.get('player')) || 1;
const gamePeerId = params.get('peer');

const color = player === 1 ? '#4fc3f7' : '#ef9a9a';
document.documentElement.style.setProperty('--color', color);
document.getElementById('player-num').textContent = player;

const connStatus = document.getElementById('conn-status');
const statusText = document.getElementById('status-text');
let conn = null;

// ── Gamepad-State ────────────────────────────────────────
const gp = { up: false, down: false, left: false, right: false, a: false, b: false, select: false, start: false };

function send() {
  if (conn?.open) conn.send({ type: 'gamepad', player,
    dpad: { up: gp.up, down: gp.down, left: gp.left, right: gp.right },
    a: gp.a, b: gp.b, select: gp.select, start: gp.start });
}

// ── D-Pad ────────────────────────────────────────────────
const dpad  = document.getElementById('dpad');
const dpEls = { up: document.getElementById('dp-u'), down: document.getElementById('dp-d'), left: document.getElementById('dp-l'), right: document.getElementById('dp-r') };
const arEls = { up: document.getElementById('a-u'),  down: document.getElementById('a-d'),  left: document.getElementById('a-l'),  right: document.getElementById('a-r') };

const activeIds = new Map();

function dirFrom(touch) {
  const r  = dpad.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  const dx = touch.clientX - cx,   dy = touch.clientY - cy;
  const zone = r.width / 4;
  return { up: dy < -zone, down: dy > zone, left: dx < -zone, right: dx > zone };
}

function refreshDpad() {
  const dirs = { up: false, down: false, left: false, right: false };
  for (const d of activeIds.values()) {
    if (d.up)    dirs.up    = true;
    if (d.down)  dirs.down  = true;
    if (d.left)  dirs.left  = true;
    if (d.right) dirs.right = true;
  }
  gp.up = dirs.up; gp.down = dirs.down; gp.left = dirs.left; gp.right = dirs.right;
  for (const dir of ['up','down','left','right']) {
    dpEls[dir].classList.toggle('active', dirs[dir]);
    arEls[dir].classList.toggle('active', dirs[dir]);
  }
  send();
}

['touchstart','touchmove'].forEach(ev =>
  dpad.addEventListener(ev, e => {
    e.preventDefault();
    for (const t of e.changedTouches) activeIds.set(t.identifier, dirFrom(t));
    refreshDpad();
  }, { passive: false })
);
['touchend','touchcancel'].forEach(ev =>
  dpad.addEventListener(ev, e => {
    e.preventDefault();
    for (const t of e.changedTouches) activeIds.delete(t.identifier);
    refreshDpad();
  }, { passive: false })
);

// ── Buttons ──────────────────────────────────────────────
function bindBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart',  e => { e.preventDefault(); gp[key] = true;  el.classList.add('active');    send(); }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); gp[key] = false; el.classList.remove('active'); send(); }, { passive: false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); gp[key] = false; el.classList.remove('active'); send(); }, { passive: false });
}
bindBtn('btn-a',      'a');
bindBtn('btn-b',      'b');
bindBtn('btn-select', 'select');
bindBtn('btn-start',  'start');

// ── PeerJS ───────────────────────────────────────────────
function connect() {
  if (!gamePeerId) { statusText.textContent = 'Kein Spiel – QR neu scannen'; connStatus.className = 'error'; return; }
  const peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(gamePeerId, { metadata: { player } });
    conn.on('open',  () => { statusText.textContent = 'Verbunden ✓'; connStatus.className = 'connected'; });
    conn.on('close', () => { statusText.textContent = 'Getrennt – lade neu...'; connStatus.className = 'error'; setTimeout(() => location.reload(), 2000); });
  });
  peer.on('error', () => { statusText.textContent = 'Verbindungsfehler'; connStatus.className = 'error'; setTimeout(() => location.reload(), 3000); });
}
connect();

// ── Wake Lock ────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); } catch {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });

setInterval(send, 33);

// ── QR-Scanner ───────────────────────────────────────────
const scanOverlay = document.getElementById('scan-overlay');
const scanVideo   = document.getElementById('scan-video');
const scanCanvas  = document.getElementById('scan-canvas');
const scanCtx     = scanCanvas.getContext('2d');
let scanStream = null, scanRaf = null;

document.getElementById('btn-scan').addEventListener('touchend', e => {
  e.preventDefault();
  startScan();
}, { passive: false });

document.getElementById('scan-close').addEventListener('touchend', e => {
  e.preventDefault();
  stopScan();
}, { passive: false });

async function startScan() {
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    scanVideo.srcObject = scanStream;
    await scanVideo.play();
    scanOverlay.classList.add('active');
    scanLoop();
  } catch {
    alert('Kamera nicht verfügbar');
  }
}

function stopScan() {
  scanOverlay.classList.remove('active');
  cancelAnimationFrame(scanRaf);
  scanStream?.getTracks().forEach(t => t.stop());
  scanStream = null;
}

function scanLoop() {
  if (!scanStream) return;
  if (scanVideo.readyState === scanVideo.HAVE_ENOUGH_DATA) {
    scanCanvas.width  = scanVideo.videoWidth;
    scanCanvas.height = scanVideo.videoHeight;
    scanCtx.drawImage(scanVideo, 0, 0);
    const img  = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
    const code = jsQR(img.data, img.width, img.height);
    if (code?.data) {
      try {
        const url = new URL(code.data);
        if (url.searchParams.has('peer')) {
          stopScan();
          location.href = code.data;
        }
      } catch {}
    }
  }
  scanRaf = requestAnimationFrame(scanLoop);
}
</script>
</body>
</html>
