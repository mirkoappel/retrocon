<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RETROCON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script>
  // Canvas nutzt Webfonts nur, wenn sie geladen sind — vorab anfordern
  if (document.fonts) document.fonts.load("16px 'Press Start 2P'");
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Boot (Terminal → RETROCON) ────────────────────── -->
<div class="screen active" id="boot">
  <div id="boot-terminal">
    <div id="boot-press-key">PRESS ANY KEY TO START</div>
    <div id="boot-cursor"></div>
  </div>
  <div id="boot-logo-screen"><div id="boot-logo"></div></div>
</div>

<!-- ── Setup-Overlay (QR-Codes) ───────────────────────── -->
<div id="setup">
  <div id="setup-panel">
    <button id="setup-close">SCHLIESSEN</button>
    <h1>VERBINDE DEIN SMARTPHONE ALS GAME-CONTROLLER</h1>
    <div id="qr-row">
      <div class="player-card">
        <div class="label">SPIELER 1</div>
        <div class="qr-wrap" id="qr-wrap-1"><div id="qr-1"></div></div>
        <div class="status-dot" id="dot-1">WARTE AUF VERBINDUNG</div>
      </div>
      <div class="player-card">
        <div class="label">SPIELER 2</div>
        <div class="qr-wrap" id="qr-wrap-2"><div id="qr-2"></div></div>
        <div class="status-dot" id="dot-2">WARTE AUF VERBINDUNG</div>
      </div>
    </div>
    <div id="setup-hints">
      <span class="hint-item"><span class="hint-key">ESC</span>SCHLIESSEN</span>
      <span class="hint-item"><span class="hint-key">A</span>SCHLIESSEN</span>
    </div>
  </div>
</div>

<!-- ── Hauptmenü ─────────────────────────────────────── -->
<div class="screen" id="main-menu">
  <h1 class="retrocon-logo">RETROCON</h1>
  <div id="carousel">
    <div class="carousel-arrow left">◀</div>
    <div id="carousel-track"></div>
    <div class="carousel-arrow right">▶</div>
  </div>
</div>

<!-- ── Game-View ─────────────────────────────────────── -->
<div id="game-view" style="display:none">
  <canvas id="game-canvas"></canvas>
</div>

<div id="footer">v0.5.0</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="../games/pong/pong.js"></script>
<script src="../games/volleyball/volleyball.js"></script>
<script src="../games/vacuum/vacuum.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
